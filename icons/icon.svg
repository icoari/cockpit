<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Bob — wink géométrique façon Bauhaus. Trois formes pleines, trois
       couleurs, fond noir profond. Œil rond vert d'eau, clin d'œil en
       demi-disque lavande, sourire en bol corail. -->
  <rect width="512" height="512" rx="116" fill="#08080E"/>
  <!-- œil gauche : cercle plein -->
  <circle cx="176" cy="190" r="46" fill="#7FD1B9"/>
  <!-- œil droit : clin d'œil, demi-disque paupière -->
  <path d="M 290 190 h 92 a 46 46 0 0 1 -92 0 Z" fill="#9D8DF1"/>
  <!-- sourire : grand bol corail -->
  <path d="M 126 300 h 260 a 130 130 0 0 1 -260 0 Z" fill="#FF7A59"/>
</svg>

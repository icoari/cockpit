<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="22%" r="85%">
      <stop offset="0%" stop-color="#1B1832"/>
      <stop offset="55%" stop-color="#11101C"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Smile: warm wide arc -->
  <path d="M 148 290 Q 256 388 364 290"
        stroke="#7FD1B9" stroke-width="24"
        fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left eye: open round dot -->
  <circle cx="184" cy="212" r="20" fill="#7FD1B9"/>
  <!-- Right eye: closed wink (horizontal stroke) -->
  <line x1="290" y1="212" x2="346" y2="212"
        stroke="#7FD1B9" stroke-width="22" stroke-linecap="round"/>
</svg>

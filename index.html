<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0F" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#F4F2EE" media="(prefers-color-scheme: light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bob">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Bob</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">

  <link rel="apple-touch-startup-image" href="icons/splash-1125x2436.png"
    media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="icons/splash-1170x2532.png"
    media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="icons/splash-1179x2556.png"
    media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="icons/splash-1242x2688.png"
    media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="icons/splash-1284x2778.png"
    media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="icons/splash-1290x2796.png"
    media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="page-header" data-page-header>
      <div class="page-header__inner">
        <p class="page-header__eyebrow" id="pageSection">Perso</p>
        <h1 class="page-header__title" id="dateLabel">samedi 16 mai</h1>
      </div>
      <button class="weather-chip" id="weatherMini" type="button" aria-label="Météo">
        <span class="weather-chip__icon" id="weatherIcon"></span>
        <span class="weather-chip__temp" id="weatherTemp">—</span>
      </button>
    </header>

    <section class="pane" data-pane="perso">
      <div class="widget" data-widget="weatherCard"></div>
      <div class="widget" data-widget="calendar"></div>
      <div class="widget" data-widget="gas"></div>
      <div class="widget" data-widget="pharmacies"></div>
      <div class="widget" data-widget="bins"></div>
      <div class="widget" data-widget="air"></div>
    </section>

    <section class="pane" data-pane="trains" hidden>
      <div class="widget" data-widget="disruptions"></div>
      <div class="widget" data-widget="trains-aller"></div>
      <div class="widget" data-widget="trains-retour"></div>
      <div class="widget" data-widget="last-train"></div>
    </section>

    <section class="pane" data-pane="pro" hidden>
      <div class="widget" data-widget="youtube"></div>
      <div class="widget" data-widget="hackernews"></div>
      <div class="widget" data-widget="techwatch"></div>
    </section>

    <section class="pane" data-pane="settings" hidden>
      <div id="settingsBody"></div>
    </section>
  </main>

  <nav class="tabbar">
    <button class="tabbar-btn" data-tab="perso" type="button">
      <span class="tabbar-btn__icon" data-icon="home"></span>
      <span class="tabbar-btn__label">Perso</span>
    </button>
    <button class="tabbar-btn" data-tab="trains" type="button">
      <span class="tabbar-btn__icon" data-icon="train"></span>
      <span class="tabbar-btn__label">Trains</span>
    </button>
    <button class="tabbar-btn" data-tab="pro" type="button">
      <span class="tabbar-btn__icon" data-icon="briefcase"></span>
      <span class="tabbar-btn__label">Pro</span>
    </button>
    <button class="tabbar-btn" data-tab="settings" type="button">
      <span class="tabbar-btn__icon" data-icon="settings"></span>
      <span class="tabbar-btn__label">Réglages</span>
    </button>
  </nav>

  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>

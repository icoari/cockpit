name = "bob"
main = "src/index.js"
compatibility_date = "2026-05-01"
workers_dev = true

# Paid plan: run the Worker close to the services it talks to (Azure LLM,
# IDFM) instead of always at the edge nearest the user.
[placement]
mode = "smart"

# Paid plan: raise the CPU ceiling well above the 10 ms free tier so embedding
# batches and Whisper post-processing have room.
[limits]
cpu_ms = 60000

[observability]
enabled = true

[[kv_namespaces]]
binding = "KV"
id = "317a9f34cb9d4c1fb377e116cbb8cbed"

# Workers AI — Whisper (speech-to-text) + bge-m3 (embeddings).
[ai]
binding = "AI"

# Vectorize — semantic memory index (1024-dim, cosine).
[[vectorize]]
binding = "VECTORIZE"
index_name = "bob-memory"

[vars]
VAPID_PUBLIC_KEY = "BFAFeTqjyY9y1FTcPcWtFHfARz4hUkXCBa9iqFePsaX0MhCiHTsXlazm65CbqIbL2EBl5qRw_tRMzdueTwsXd9o"
VAPID_SUBJECT    = "mailto:bob@icoari.dev"
# VAPID_PRIVATE_KEY is a secret, set via:  wrangler secret put VAPID_PRIVATE_KEY

[triggers]
crons = [
  "*/10 * * * *",    # feed aggregation
  "*/5 6-23 * * *",  # IDFM disruption watch
  "0 5 * * *",       # morning brief push (7h Paris summer / 6h winter)
  "0 16 * * *",      # last-train-of-tonight check (18h Paris summer / 17h winter)
  "0 21 * * *",      # health-tracker evening reminder (23h Paris summer)
]

# R2 binding — uncomment after enabling R2 in the Cloudflare dashboard,
# then run: wrangler r2 bucket create bob-photos
# [[r2_buckets]]
# binding = "PHOTOS"
# bucket_name = "bob-photos"

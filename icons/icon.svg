<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Bob — le clin d'œil qui déborde. Noir profond, deux tons, composition
       décentrée : le sourire s'échappe du cadre à droite. -->
  <defs>
    <clipPath id="frame"><rect width="512" height="512" rx="116"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="512" height="512" fill="#070709"/>
    <!-- pixel signature, coin haut-gauche -->
    <rect x="92" y="92" width="28" height="28" rx="8" fill="#7FD1B9" opacity="0.92"/>
    <!-- œil gauche : carré arrondi -->
    <rect x="238" y="196" width="46" height="46" rx="15" fill="#7FD1B9"/>
    <!-- œil droit : clin d'œil en diagonale -->
    <line x1="360" y1="225" x2="424" y2="201" stroke="#7FD1B9" stroke-width="26" stroke-linecap="round"/>
    <!-- sourire : grand arc qui sort du cadre -->
    <path d="M 216 322 Q 348 448 540 330" stroke="#F4F2EE" stroke-width="30" fill="none" stroke-linecap="round"/>
  </g>
</svg>

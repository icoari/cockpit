name = "bob"
main = "src/index.js"
compatibility_date = "2026-05-01"
workers_dev = true

[[kv_namespaces]]
binding = "KV"
id = "317a9f34cb9d4c1fb377e116cbb8cbed"

[vars]
VAPID_PUBLIC_KEY = "BFAFeTqjyY9y1FTcPcWtFHfARz4hUkXCBa9iqFePsaX0MhCiHTsXlazm65CbqIbL2EBl5qRw_tRMzdueTwsXd9o"
VAPID_SUBJECT    = "mailto:bob@icoari.dev"
# VAPID_PRIVATE_KEY is a secret, set via:  wrangler secret put VAPID_PRIVATE_KEY

[triggers]
crons = [
  "*/10 * * * *",    # feed aggregation
  "*/5 6-23 * * *",  # IDFM disruption watch
  "0 5 * * *",       # morning brief push (7h Paris summer / 6h winter)
  "0 16 * * *",      # last-train-of-tonight check (18h Paris summer / 17h winter)
  "0 21 * * *",      # health-tracker evening reminder (23h Paris summer)
]

